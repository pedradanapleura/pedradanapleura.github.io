<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedrada na Pleura</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  background: #0d0d0d url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
  font-family: Arial, sans-serif;
  color: #fff;
  text-align: center;
}

header {
  padding: 30px 20px 10px;
}

h1 {
  color: #f5c542;
  letter-spacing: 4px;
  font-size: 32px;
  margin: 0;
}

.sub {
  color: #1db954;
  margin-top: 8px;
}

.live {
  color: red;
  margin: 20px 0;
  font-weight: bold;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {opacity: 1;}
  50% {opacity: 0.4;}
  100% {opacity: 1;}
}

.player-box {
  margin: 30px auto;
  max-width: 350px;
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

button {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(90deg, green, yellow, red);
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

.music-name {
  margin-top: 20px;
  font-size: 14px;
  color: #ccc;
}

.listeners {
  margin-top: 10px;
  color: #1db954;
  font-size: 14px;
}

.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: #000;
  padding: 15px 18px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Pedrada na Pleura"
       style="width:180px; max-width:80%; margin-bottom:20px;">

  <h1>PEDRADA NA PLEURA</h1>
  <div class="sub">A Frequęncia da Resistęncia</div>
  <div class="live">?? AO VIVO AGORA</div>
</header>

<div class="player-box">
  <audio id="radio" src="https://stream.zeno.fm/4yhhgfnjxgwuv"></audio>

  <button id="playBtn" onclick="toggleRadio()">?? ROOTS PLAY</button>

  <div style="margin-top:20px;">
    ?? Volume
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
  </div>

  <div class="music-name" id="music">Carregando música...</div>
  <div class="listeners" id="listeners">?? Ouvintes agora: 0</div>
</div>

<a class="whatsapp" href="https://wa.me/5551983457216" target="_blank">
  WhatsApp
</a>

<script>
const radio = document.getElementById("radio");
const volume = document.getElementById("volume");
const playBtn = document.getElementById("playBtn");
const music = document.getElementById("music");
const listeners = document.getElementById("listeners");

radio.volume = 0.7;

volume.addEventListener("input", function() {
  radio.volume = this.value;
});

let playing = false;

function toggleRadio(){
  if(!playing){
    radio.play();
    playing = true;
    playBtn.innerHTML = "? PAUSAR";
  } else {
    radio.pause();
    playing = false;
    playBtn.innerHTML = "?? ROOTS PLAY";
  }
}

/* ===== DADOS PELO WORKER ===== */

async function atualizarMusica() {
  try {
    const resposta = await fetch("https://empty-water-d350.xandi-xni.workers.dev/");
    const dados = await resposta.json();

    music.innerText = dados.musica || "Ao Vivo";
    listeners.innerText = "?? Ouvintes agora: " + (dados.ouvintes || 0);

  } catch (erro) {
    music.innerText = "Ao Vivo";
    listeners.innerText = "?? Ouvintes agora: 0";
  }
}

atualizarMusica();
setInterval(atualizarMusica, 15000);

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
